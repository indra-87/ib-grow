<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Grow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
      /* 주의: 브라우저용 스크립트에서는 import 문을 모두 지워야 합니다. 
         대신 아래와 같이 전역 변수에서 가져와서 사용합니다.
      */
      const { useState, useRef, useEffect, useCallback, useMemo } = React;
      const { createClient } = supabase;

      // ═══════════════════════════════════════════════════════════════════════════════
      // CONFIG & SUPABASE 연동
      // ═══════════════════════════════════════════════════════════════════════════════
      const SUPABASE_URL = "https://pqjuvuflinnrpemqcafl.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxanV2dWZsaW5ucnBlbXFjYWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NzAzMjQsImV4cCI6MjA5NDA0NjMyNH0.E4sJv1gM9TbWG-2o90aH8wJXZMLRY_uLQ9fgWARX1Ro";
      const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      const GEMINI_API_KEY = "AIzaSyAbjeTs7-di6mrIT7JKhCxCOGvXPjjn76M";
      const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
      const MASTER_ID = "admin";
      const MASTER_PW = "grow123";

      // ═══════════════════════════════════════════════════════════════════════════════
      // CONSTANTS (기존 코드와 동일)
      // ═══════════════════════════════════════════════════════════════════════════════
      const IB_PROFILES = [
        { id: "inquirer",      icon: "🔍", label: "탐구하는 사람",   color: "#8B5CF6" },
        { id: "knowledgeable", icon: "📚", label: "지식이 있는 사람", color: "#3B82F6" },
        { id: "thinker",       icon: "💡", label: "생각하는 사람",   color: "#F59E0B" },
        { id: "communicator",  icon: "💬", label: "소통하는 사람",   color: "#10B981" },
        { id: "principled",    icon: "⚖️", label: "원칙이 있는 사람", color: "#EF4444" },
        { id: "open-minded",   icon: "🌍", label: "열린 마음",       color: "#06B6D4" },
        { id: "caring",        icon: "🤝", label: "배려하는 사람",   color: "#EC4899" },
        { id: "risk-taker",    icon: "🚀", label: "도전하는 사람",   color: "#F97316" },
        { id: "balanced",      icon: "⚡", label: "균형잡힌 사람",   color: "#84CC16" },
        { id: "reflective",    icon: "💭", label: "성찰하는 사람",   color: "#A78BFA" },
      ];

      const LEVELS = [
        { lv: 1, name: "씨앗",   icon: "🌱", xp: 0    },
        { lv: 2, name: "새싹",   icon: "🌿", xp: 150  },
        { lv: 3, name: "탐구자", icon: "🔭", xp: 400  },
        { lv: 4, name: "발견자", icon: "📖", xp: 800  },
        { lv: 5, name: "사상가", icon: "💡", xp: 1500 },
        { lv: 6, name: "선구자", icon: "🚀", xp: 2500 },
        { lv: 7, name: "마스터", icon: "👑", xp: 4000 },
      ];

      const getLv = xp => LEVELS.reduce((acc, curr) => (xp >= curr.xp ? curr : acc), LEVELS[0]);
      const uid = () => Math.random().toString(36).slice(2, 10).toUpperCase();

      // ═══════════════════════════════════════════════════════════════════════════════
      // 하위 UI 컴포넌트들 (기존 코드 복구)
      // ═══════════════════════════════════════════════════════════════════════════════
      
      // 여기에 기존에 작성하셨던 LoginScreen, StudentApp, TeacherApp, MasterApp 등의 
      // 모든 컴포넌트 코드를 넣어주세요. (글자수 제한으로 핵심 구조만 작성합니다.)

      function LoginScreen({ teachers, classes, onStudentLogin, onTeacherLogin, onMasterLogin }) {
          const [id, setId] = useState("");
          const [pw, setPw] = useState("");
          const handleLogin = () => {
              if (id === MASTER_ID && pw === MASTER_PW) return onMasterLogin();
              const teacher = teachers.find(t => t.teacher_code === id);
              if (teacher) return onTeacherLogin(teacher);
              // 학생 로그인 로직...
              alert("정보를 확인해주세요.");
          };
          return (
              <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-50">
                  <div className="w-full max-w-md p-8 bg-white rounded-3xl shadow-xl border border-slate-100 text-center">
                      <h1 className="text-4xl mb-2">🌱</h1>
                      <h2 className="text-2xl font-bold text-slate-800 mb-6">IB Grow 로그인</h2>
                      <input className="w-full p-4 mb-3 border rounded-xl" placeholder="아이디/코드" value={id} onChange={e=>setId(e.target.value)} />
                      <input className="w-full p-4 mb-6 border rounded-xl" type="password" placeholder="비밀번호" value={pw} onChange={e=>setPw(e.target.value)} />
                      <button onClick={handleLogin} className="w-full p-4 bg-indigo-600 text-white rounded-xl font-bold">입장하기</button>
                  </div>
              </div>
          );
      }

      // ═══════════════════════════════════════════════════════════════════════════════
      // MAIN APP
      // ═══════════════════════════════════════════════════════════════════════════════
      function IBGrowApp() {
          const [dbLoading, setDbLoading] = useState(true);
          const [teachers, setTeachers] = useState([]);
          const [classes, setClasses] = useState([]);
          const [mode, setMode] = useState("login");

          useEffect(() => {
              async function loadData() {
                  setDbLoading(true);
                  try {
                      const { data: tData } = await sb.from('teachers').select('*');
                      const { data: cData } = await sb.from('classes').select('*, students(*), records(*)');
                      setTeachers(tData || []);
                      setClasses(cData || []);
                  } catch (err) {
                      console.error("Data Load Error:", err);
                  } finally {
                      setDbLoading(false);
                  }
              }
              loadData();
          }, []);

          if (dbLoading) {
              return (
                  <div className="flex flex-col items-center justify-center h-screen bg-white">
                      <div className="animate-spin rounded-full h-12 w-12 border-b-4 border-indigo-600 mb-4"></div>
                      <p className="text-gray-500 font-medium">데이터를 동기화 중입니다...</p>
                  </div>
              );
          }

          if (mode === "login") {
              return <LoginScreen teachers={teachers} classes={classes} 
                        onMasterLogin={() => setMode("master")}
                        onTeacherLogin={() => setMode("teacher")} />;
          }

          return <div className="p-10 text-center">접속 성공! (나머지 앱 화면 구현 필요)</div>;
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<IBGrowApp />);
    </script>
</body>
</html>
