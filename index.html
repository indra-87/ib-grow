<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Grow - 전체 기능 버전</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { createClient } = supabase;

        // ═══════════════════════════════════════════════════════════════════════════════
        // 1. CONFIG & CONSTANTS
        // ═══════════════════════════════════════════════════════════════════════════════
        const SUPABASE_URL = "https://pqjuvuflinnrpemqcafl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxanV2dWZsaW5ucnBlbXFjYWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NzAzMjQsImV4cCI6MjA5NDA0NjMyNH0.E4sJv1gM9TbWG-2o90aH8wJXZMLRY_uLQ9fgWARX1Ro";
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const GEMINI_API_KEY = "AIzaSyAbjeTs7-di6mrIT7JKhCxCOGvXPjjn76M";
        const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
        
        const MASTER_ID = "admin";
        const MASTER_PW = "grow123";

        const IB_PROFILES = [
            { id: "inquirer",      icon: "🔍", label: "탐구하는 사람",   color: "#8B5CF6" },
            { id: "knowledgeable", icon: "📚", label: "지식이 있는 사람", color: "#3B82F6" },
            { id: "thinker",       icon: "💡", label: "생각하는 사람",   color: "#F59E0B" },
            { id: "communicator",  icon: "💬", label: "소통하는 사람",   color: "#10B981" },
            { id: "principled",    icon: "⚖️", label: "원칙이 있는 사람", color: "#EF4444" },
            { id: "open-minded",   icon: "🌍", label: "열린 마음",       color: "#06B6D4" },
            { id: "caring",        icon: "🤝", label: "배려하는 사람",   color: "#EC4899" },
            { id: "risk-taker",    icon: "🚀", label: "도전하는 사람",   color: "#F97316" },
            { id: "balanced",      icon: "⚡", label: "균형잡힌 사람",   color: "#84CC16" },
            { id: "reflective",    icon: "💭", label: "성찰하는 사람",   color: "#A78BFA" },
        ];

        const LEVELS = [
            { lv: 1, name: "씨앗",   icon: "🌱", xp: 0    },
            { lv: 2, name: "새싹",   icon: "🌿", xp: 150  },
            { lv: 3, name: "탐구자", icon: "🔭", xp: 400  },
            { lv: 4, name: "발견자", icon: "📖", xp: 800  },
            { lv: 5, name: "사상가", icon: "💡", xp: 1500 },
            { lv: 6, name: "선구자", icon: "🚀", xp: 2500 },
            { lv: 7, name: "마스터", icon: "👑", xp: 4000 },
        ];

        const getLv = xp => LEVELS.reduce((acc, curr) => (xp >= curr.xp ? curr : acc), LEVELS[0]);
        const uid = () => Math.random().toString(36).slice(2, 10).toUpperCase();

        // ═══════════════════════════════════════════════════════════════════════════════
        // 2. COMPONENTS (UI)
        // ═══════════════════════════════════════════════════════════════════════════════

        // [LoginScreen]
        function LoginScreen({ teachers, classes, onStudentLogin, onTeacherLogin, onMasterLogin }) {
            const [id, setId] = useState("");
            const [pw, setPw] = useState("");

            const handleLogin = () => {
                if (id === MASTER_ID && pw === MASTER_PW) return onMasterLogin();
                const teacher = teachers.find(t => t.teacher_code === id);
                if (teacher) return onTeacherLogin(teacher);
                const student = classes.flatMap(c => c.students || []).find(s => s.student_code === id);
                if (student) {
                    const cls = classes.find(c => c.id === student.class_id);
                    return onStudentLogin(student, cls);
                }
                alert("아이디 또는 코드를 확인해주세요.");
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6">
                    <div className="w-full max-w-md p-10 bg-white rounded-[2.5rem] shadow-2xl border border-slate-100 text-center">
                        <div className="text-6xl mb-4 animate-bounce">🌱</div>
                        <h1 className="text-3xl font-bold text-indigo-600 mb-2">IB Grow</h1>
                        <p className="text-slate-400 mb-10 font-medium tracking-tight">나의 성장을 기록하고 발견해요</p>
                        <div className="space-y-4 text-left">
                            <input className="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all" placeholder="개인코드 또는 아이디" value={id} onChange={e=>setId(e.target.value)} />
                            <input className="w-full p-4 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all" type="password" placeholder="비밀번호 (관리자용)" value={pw} onChange={e=>setPw(e.target.value)} />
                            <button onClick={handleLogin} className="w-full p-4 mt-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 transition-all active:scale-95">입장하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        // [StudentApp]
        function StudentApp({ student, classData, onAddRecord, onLogout }) {
            const [content, setContent] = useState("");
            const [selectedProfiles, setSelectedProfiles] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const lvInfo = getLv(student.total_xp);

            const toggleProfile = (id) => setSelectedProfiles(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

            const submitRecord = async () => {
                if (!content.trim()) return alert("내용을 입력하세요.");
                setIsAnalyzing(true);
                
                // Gemini AI 분석 (선택사항이나 여기서는 기본 로직 포함)
                const record = {
                    student_id: student.id,
                    date: new Date().toISOString(),
                    content: content,
                    profiles: selectedProfiles,
                    xp: 10 * (selectedProfiles.length || 1),
                    type: "student_entry"
                };

                let pScores = {};
                selectedProfiles.forEach(p => pScores[p] = 10);

                await onAddRecord(classData.id, record, record.xp, pScores, {});
                setContent(""); setSelectedProfiles([]); setIsAnalyzing(false);
                alert("성공적으로 기록되었습니다!");
            };

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    <div className="bg-white p-6 rounded-b-[3rem] shadow-sm mb-6 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800">{student.name}</h2>
                                <p className="text-indigo-600 font-bold text-sm tracking-wide">{classData.name}</p>
                            </div>
                            <button onClick={onLogout} className="p-3 bg-slate-50 rounded-2xl text-slate-400">🚪</button>
                        </div>
                        <div className="bg-indigo-50 p-5 rounded-3xl flex items-center gap-5">
                            <div className="text-5xl bg-white w-20 h-20 flex items-center justify-center rounded-2xl shadow-sm">{lvInfo.icon}</div>
                            <div className="flex-1">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="font-bold text-indigo-700">Lv.{lvInfo.lv} {lvInfo.name}</span>
                                    <span className="text-xs font-bold text-slate-400">{student.total_xp} XP</span>
                                </div>
                                <div className="h-3 bg-indigo-200 rounded-full overflow-hidden">
                                    <div className="bg-indigo-600 h-full transition-all duration-1000" style={{width: `${Math.min(100, (student.total_xp/4000)*100)}%`}}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="px-6 space-y-6 max-w-md mx-auto">
                        <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100">
                            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">✍️ 오늘 어떤 배움이 있었나요?</h3>
                            <textarea className="w-full h-40 p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-400 outline-none resize-none text-sm mb-4" placeholder="자유롭게 적어보세요..." value={content} onChange={e=>setContent(e.target.value)} />
                            <p className="text-xs font-bold text-slate-400 mb-3 px-1">학습자 상 연결하기</p>
                            <div className="grid grid-cols-5 gap-2 mb-6">
                                {IB_PROFILES.map(p => (
                                    <button key={p.id} onClick={() => toggleProfile(p.id)} className={`flex flex-col items-center p-2 rounded-2xl border-2 transition-all ${selectedProfiles.includes(p.id) ? 'border-indigo-500 bg-indigo-50' : 'border-transparent bg-slate-50 opacity-40'}`}>
                                        <span className="text-xl">{p.icon}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={submitRecord} disabled={isAnalyzing} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 disabled:bg-slate-300 transition-all">
                                {isAnalyzing ? "기록 분석 중..." : "기록 남기기"}
                            </button>
                        </div>

                        <div className="space-y-4">
                            <h3 className="font-bold text-slate-800 px-1">나의 최근 성장</h3>
                            {(classData.records || []).filter(r => r.student_id === student.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                <div key={r.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                    <div className="flex justify-between text-[10px] font-bold text-slate-300 mb-2 uppercase tracking-widest">
                                        <span>{new Date(r.date).toLocaleDateString()}</span>
                                        <span className="text-indigo-400">+{r.xp} XP</span>
                                    </div>
                                    <p className="text-slate-600 text-sm leading-relaxed mb-4">{r.content}</p>
                                    <div className="flex flex-wrap gap-1">
                                        {r.profiles?.map(pid => (
                                            <span key={pid} className="px-2 py-0.5 bg-indigo-50 text-indigo-400 text-[10px] rounded-md font-bold">#{IB_PROFILES.find(p=>p.id===pid)?.label}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // [Teacher/Master UI는 간략히 유지하거나 필요 시 확장]
        function TeacherApp({ teacher, classes, onLogout }) {
            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center">
                        <h1 className="text-xl font-bold text-slate-800">{teacher.name} 선생님</h1>
                        <button onClick={onLogout} className="p-3 text-slate-400">🚪</button>
                    </header>
                    <main className="p-6 space-y-4">
                        <h2 className="font-bold text-slate-500 uppercase text-xs">우리 반 목록</h2>
                        {classes.map(c => (
                            <div key={c.id} className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
                                <p className="font-bold text-indigo-600">{c.name}</p>
                                <p className="text-xs text-slate-400 mt-1">학생 수: {c.students?.length || 0}명</p>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════════
        // 3. MAIN APP CONTAINER
        // ═══════════════════════════════════════════════════════════════════════════════
        function IBGrowApp() {
            const [loading, setLoading] = useState(true);
            const [teachers, setTeachers] = useState([]);
            const [classes, setClasses] = useState([]);
            const [mode, setMode] = useState("login");
            const [currUser, setCurrUser] = useState(null);
            const [currClass, setCurrClass] = useState(null);

            const fetchData = async () => {
                setLoading(true);
                const { data: t } = await sb.from('teachers').select('*');
                const { data: c } = await sb.from('classes').select('*, students(*), records(*)');
                setTeachers(t || []);
                setClasses(c || []);
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const addRecord = async (cid, rec, xp, ps, as) => {
                await sb.from('records').insert([{ ...rec, class_id: cid, profile_scores: ps, atl_scores: as }]);
                const newXp = (currUser.total_xp || 0) + xp;
                const newProfiles = { ...(currUser.profiles || {}) };
                Object.entries(ps).forEach(([k,v]) => newProfiles[k] = (newProfiles[k]||0) + v);
                await sb.from('students').update({ total_xp: newXp, profiles: newProfiles, level: getLv(newXp).lv }).eq('id', currUser.id);
                
                // 데이터 리프레시 후 상태 업데이트
                const { data: updatedC } = await sb.from('classes').select('*, students(*), records(*)').eq('id', cid).single();
                setCurrUser(updatedC.students.find(s => s.id === currUser.id));
                setCurrClass(updatedC);
                setClasses(prev => prev.map(c => c.id === cid ? updatedC : c));
            };

            if (loading && mode === "login") return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-400 font-bold">IB GROW 로딩 중...</p>
                </div>
            );

            if (mode === "login") return <LoginScreen teachers={teachers} classes={classes} 
                                            onMasterLogin={()=>setMode("master")} 
                                            onTeacherLogin={t=>{setCurrUser(t); setMode("teacher");}} 
                                            onStudentLogin={(s,c)=>{setCurrUser(s); setCurrClass(c); setMode("student");}} />;
            
            if (mode === "student") return <StudentApp student={currUser} classData={currClass} onAddRecord={addRecord} onLogout={()=>setMode("login")} />;
            
            if (mode === "teacher") return <TeacherApp teacher={currUser} classes={classes.filter(c=>c.teacher_id===currUser.id)} onLogout={()=>setMode("login")} />;

            return <div className="p-10 text-center">준비 중인 화면입니다. <button onClick={()=>setMode("login")}>돌아가기</button></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IBGrowApp />);
    </script>
</body>
</html>
