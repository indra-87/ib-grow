<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Grow - 초등 교육용 웹앱</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Supabase -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback, useMemo } = React;
        const { createClient } = supabase;

        // ═══════════════════════════════════════════════════════════════════════════════
        // 1. CONFIG & SUPABASE
        // ═══════════════════════════════════════════════════════════════════════════════
        const SUPABASE_URL = "https://pqjuvuflinnrpemqcafl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxanV2dWZsaW5ucnBlbXFjYWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NzAzMjQsImV4cCI6MjA5NDA0NjMyNH0.E4sJv1gM9TbWG-2o90aH8wJXZMLRY_uLQ9fgWARX1Ro";
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const MASTER_ID = "admin";
        const MASTER_PW = "grow123";

        // ═══════════════════════════════════════════════════════════════════════════════
        // 2. CONSTANTS
        // ═══════════════════════════════════════════════════════════════════════════════
        const IB_PROFILES = [
            { id: "inquirer",      icon: "🔍", label: "탐구하는 사람",   color: "#8B5CF6" },
            { id: "knowledgeable", icon: "📚", label: "지식이 있는 사람", color: "#3B82F6" },
            { id: "thinker",       icon: "💡", label: "생각하는 사람",   color: "#F59E0B" },
            { id: "communicator",  icon: "💬", label: "소통하는 사람",   color: "#10B981" },
            { id: "principled",    icon: "⚖️", label: "원칙이 있는 사람", color: "#EF4444" },
            { id: "open-minded",   icon: "🌍", label: "열린 마음",       color: "#06B6D4" },
            { id: "caring",        icon: "🤝", label: "배려하는 사람",   color: "#EC4899" },
            { id: "risk-taker",    icon: "🚀", label: "도전하는 사람",   color: "#F97316" },
            { id: "balanced",      icon: "⚡", label: "균형잡힌 사람",   color: "#84CC16" },
            { id: "reflective",    icon: "💭", label: "성찰하는 사람",   color: "#A78BFA" },
        ];

        const LEVELS = [
            { lv: 1, name: "씨앗",   icon: "🌱", xp: 0    },
            { lv: 2, name: "새싹",   icon: "🌿", xp: 150  },
            { lv: 3, name: "탐구자", icon: "🔭", xp: 400  },
            { lv: 4, name: "발견자", icon: "📖", xp: 800  },
            { lv: 5, name: "사상가", icon: "💡", xp: 1500 },
            { lv: 6, name: "선구자", icon: "🚀", xp: 2500 },
            { lv: 7, name: "마스터", icon: "👑", xp: 4000 },
        ];

        const getLv = xp => LEVELS.reduce((acc, curr) => (xp >= curr.xp ? curr : acc), LEVELS[0]);
        const uid = () => Math.random().toString(36).slice(2, 10).toUpperCase();

        // ═══════════════════════════════════════════════════════════════════════════════
        // 3. COMPONENTS
        // ═══════════════════════════════════════════════════════════════════════════════

        function LoginScreen({ teachers, classes, onStudentLogin, onTeacherLogin, onMasterLogin }) {
            const [id, setId] = useState("");
            const [pw, setPw] = useState("");
            const handleLogin = () => {
                if (id === MASTER_ID && pw === MASTER_PW) return onMasterLogin();
                const teacher = teachers.find(t => t.teacher_code === id);
                if (teacher) return onTeacherLogin(teacher);
                const student = classes.flatMap(c => c.students || []).find(s => s.student_code === id);
                if (student) {
                    const cls = classes.find(c => c.id === student.class_id);
                    return onStudentLogin(student, cls);
                }
                alert("아이디 또는 코드를 확인해주세요.");
            };
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-50">
                    <div className="w-full max-w-md p-8 bg-white rounded-3xl shadow-2xl border border-slate-100 text-center">
                        <div className="text-5xl mb-4">🌱</div>
                        <h1 className="text-3xl font-bold text-indigo-600 mb-2">IB Grow</h1>
                        <p className="text-slate-500 mb-8 font-medium">나의 성장을 기록하는 공간</p>
                        <div className="space-y-4 text-left">
                            <div>
                                <label className="text-xs font-bold text-slate-400 ml-1">ID / CODE</label>
                                <input className="w-full p-4 mt-1 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all" placeholder="개인코드 또는 아이디" value={id} onChange={e=>setId(e.target.value)} />
                            </div>
                            <div>
                                <label className="text-xs font-bold text-slate-400 ml-1">PASSWORD (Optional)</label>
                                <input className="w-full p-4 mt-1 bg-slate-100 border-none rounded-2xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all" type="password" placeholder="관리자 비밀번호" value={pw} onChange={e=>setPw(e.target.value)} />
                            </div>
                            <button onClick={handleLogin} className="w-full p-4 mt-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 transition-all active:scale-95">입장하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        function StudentApp({ student, classData, onAddRecord, onLogout }) {
            const [content, setContent] = useState("");
            const [selectedProfiles, setSelectedProfiles] = useState([]);
            const [loading, setLoading] = useState(false);
            const lvInfo = getLv(student.total_xp);

            const toggleProfile = (id) => setSelectedProfiles(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

            const submit = async () => {
                if (!content.trim()) return alert("기록할 내용을 입력하세요.");
                setLoading(true);
                const record = {
                    student_id: student.id,
                    date: new Date().toISOString(),
                    content: content,
                    profiles: selectedProfiles,
                    xp: 10 * (selectedProfiles.length || 1),
                    type: "student_entry"
                };
                let pScores = {};
                selectedProfiles.forEach(p => pScores[p] = 10);
                await onAddRecord(classData.id, record, record.xp, pScores, {});
                setContent(""); setSelectedProfiles([]); setLoading(false);
                alert("기록되었습니다!");
            };

            return (
                <div className="min-h-screen pb-24 bg-slate-50">
                    <div className="bg-white p-6 rounded-b-[2.5rem] shadow-sm mb-6 border-b border-slate-100">
                        <div className="flex justify-between items-center mb-6">
                            <div>
                                <h2 className="text-2xl font-bold text-slate-800">{student.name}</h2>
                                <p className="text-indigo-600 font-bold text-sm">{classData.name}</p>
                            </div>
                            <button onClick={onLogout} className="w-10 h-10 flex items-center justify-center bg-slate-100 rounded-full text-slate-400">🚪</button>
                        </div>
                        <div className="bg-indigo-50 p-5 rounded-3xl flex items-center gap-4">
                            <div className="text-4xl bg-white w-16 h-16 flex items-center justify-center rounded-2xl shadow-sm">{lvInfo.icon}</div>
                            <div className="flex-1">
                                <div className="flex justify-between items-end mb-2">
                                    <span className="font-bold text-indigo-700">Lv.{lvInfo.lv} {lvInfo.name}</span>
                                    <span className="text-xs font-bold text-slate-400">{student.total_xp} XP</span>
                                </div>
                                <div className="h-2.5 bg-indigo-200 rounded-full overflow-hidden">
                                    <div className="bg-indigo-600 h-full transition-all duration-1000" style={{width: `${Math.min(100, (student.total_xp/4000)*100)}%`}}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="px-6 space-y-6 max-w-lg mx-auto">
                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                            <h3 className="font-bold text-slate-800 mb-4 flex items-center gap-2">📝 오늘의 성장 기록</h3>
                            <textarea className="w-full h-32 p-4 bg-slate-50 rounded-2xl border-none focus:ring-2 focus:ring-indigo-400 outline-none resize-none text-sm mb-4" placeholder="오늘 무엇을 배우고 느꼈나요?" value={content} onChange={e=>setContent(e.target.value)} />
                            <p className="text-xs font-bold text-slate-400 mb-3 px-1 uppercase tracking-wider">학습자 상 선택</p>
                            <div className="grid grid-cols-5 gap-2 mb-6">
                                {IB_PROFILES.map(p => (
                                    <button key={p.id} onClick={() => toggleProfile(p.id)} className={`flex flex-col items-center p-2 rounded-2xl border-2 transition-all ${selectedProfiles.includes(p.id) ? 'border-indigo-500 bg-indigo-50' : 'border-transparent bg-slate-50 opacity-40'}`}>
                                        <span className="text-xl">{p.icon}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={submit} disabled={loading} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 disabled:bg-slate-300 transition-all">
                                {loading ? "저장 중..." : "기록 남기기"}
                            </button>
                        </div>

                        <div className="space-y-3">
                            <h3 className="font-bold text-slate-800 px-1">최근 나의 기록</h3>
                            {(classData.records || []).filter(r => r.student_id === student.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                <div key={r.id} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm">
                                    <div className="flex justify-between text-[10px] font-bold text-slate-300 mb-2 uppercase tracking-widest">
                                        <span>{new Date(r.date).toLocaleDateString()}</span>
                                        <span className="text-indigo-400">+{r.xp} XP</span>
                                    </div>
                                    <p className="text-slate-600 text-sm leading-relaxed mb-3">{r.content}</p>
                                    <div className="flex flex-wrap gap-1">
                                        {r.profiles?.map(pid => (
                                            <span key={pid} className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[10px] rounded-md font-medium">#{IB_PROFILES.find(p=>p.id===pid)?.label}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function TeacherApp({ teacher, classes, onLogout, onUpdateClass }) {
            const [selClsId, setSelClsId] = useState(classes[0]?.id || "");
            const currentCls = classes.find(c => c.id === selClsId);

            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-white p-6 border-b border-slate-100 flex justify-between items-center">
                        <div>
                            <h1 className="text-xl font-bold text-slate-800">{teacher.name} 선생님</h1>
                            <p className="text-xs text-indigo-500 font-bold uppercase tracking-widest">Teacher Dashboard</p>
                        </div>
                        <button onClick={onLogout} className="p-3 bg-slate-50 rounded-2xl text-slate-400">🚪</button>
                    </header>
                    <main className="p-6 max-w-4xl mx-auto space-y-6">
                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                            {classes.map(c => (
                                <button key={c.id} onClick={()=>setSelClsId(c.id)} className={`px-5 py-2.5 rounded-2xl font-bold whitespace-nowrap transition-all ${selClsId === c.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-100' : 'bg-white text-slate-400 border border-slate-100'}`}>{c.name}</button>
                            ))}
                        </div>
                        {currentCls && (
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {currentCls.students?.sort((a,b)=>a.num - b.num).map(s => (
                                    <div key={s.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex items-center justify-between shadow-sm">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 bg-slate-100 rounded-2xl flex items-center justify-center font-bold text-slate-400">{s.num}</div>
                                            <div>
                                                <p className="font-bold text-slate-800">{s.name}</p>
                                                <p className="text-xs text-slate-400">Lv.{s.level} | {s.total_xp} XP</p>
                                            </div>
                                        </div>
                                        <div className="text-[10px] font-mono text-slate-200 bg-slate-50 px-2 py-1 rounded-md">{s.student_code}</div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        function MasterApp({ teachers, onUpdateTeacher, onLogout }) {
            const [name, setName] = useState("");
            const [code, setCode] = useState("");
            const add = async () => {
                if(!name || !code) return;
                await onUpdateTeacher({ id: uid(), name, teacher_code: code, class_ids: [] });
                setName(""); setCode("");
            };
            return (
                <div className="min-h-screen bg-slate-900 text-white p-8">
                    <div className="flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-bold">Admin System</h1>
                        <button onClick={onLogout} className="px-4 py-2 bg-slate-800 rounded-xl text-sm font-bold">Logout</button>
                    </div>
                    <div className="bg-slate-800 p-6 rounded-3xl mb-10 border border-slate-700">
                        <h2 className="text-indigo-400 font-bold mb-4">신규 교사 등록</h2>
                        <div className="flex flex-col sm:flex-row gap-3">
                            <input className="flex-1 bg-slate-900 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="교사 이름" value={name} onChange={e=>setName(e.target.value)} />
                            <input className="flex-1 bg-slate-900 p-4 rounded-2xl border-none outline-none focus:ring-2 focus:ring-indigo-500" placeholder="로그인 코드" value={code} onChange={e=>setCode(e.target.value)} />
                            <button onClick={add} className="px-8 py-4 bg-indigo-600 rounded-2xl font-bold hover:bg-indigo-500 transition-all">등록</button>
                        </div>
                    </div>
                    <div className="space-y-3">
                        <h2 className="text-slate-500 font-bold px-2 uppercase text-xs tracking-widest">Teachers List</h2>
                        {teachers.map(t => (
                            <div key={t.id} className="bg-slate-800 p-5 rounded-3xl flex justify-between items-center border border-slate-700">
                                <div>
                                    <p className="font-bold text-lg">{t.name}</p>
                                    <p className="text-xs text-slate-500 font-mono">{t.teacher_code}</p>
                                </div>
                                <div className="text-xs bg-indigo-900/30 text-indigo-400 px-3 py-1 rounded-full font-bold">ACTIVE</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════════
        // 4. MAIN APP CONTAINER
        // ═══════════════════════════════════════════════════════════════════════════════
        function IBGrowApp() {
            const [loading, setLoading] = useState(true);
            const [teachers, setTeachers] = useState([]);
            const [classes, setClasses] = useState([]);
            const [mode, setMode] = useState("login");
            const [currUser, setCurrUser] = useState(null);
            const [currClass, setCurrClass] = useState(null);

            const refresh = async () => {
                setLoading(true);
                const { data: t } = await sb.from('teachers').select('*');
                const { data: c } = await sb.from('classes').select('*, students(*), records(*)');
                setTeachers(t || []);
                setClasses(c || []);
                setLoading(false);
            };

            useEffect(() => { refresh(); }, []);

            const addRecord = async (cid, rec, xp, ps, as) => {
                await sb.from('records').insert([{ ...rec, class_id: cid, profile_scores: ps, atl_scores: as }]);
                const newXp = currUser.total_xp + xp;
                const newProfiles = { ...currUser.profiles };
                Object.entries(ps).forEach(([k,v]) => newProfiles[k] = (newProfiles[k]||0) + v);
                await sb.from('students').update({ total_xp: newXp, profiles: newProfiles, level: getLv(newXp).lv }).eq('id', currUser.id);
                
                // 데이터 최신화 후 상태 동기화
                const { data: updatedC } = await sb.from('classes').select('*, students(*), records(*)').eq('id', cid).single();
                setClasses(prev => prev.map(c => c.id === cid ? updatedC : c));
                setCurrUser(updatedC.students.find(s => s.id === currUser.id));
                setCurrClass(updatedC);
            };

            const upTeacher = async (obj) => {
                await sb.from('teachers').upsert(obj);
                await refresh();
            };

            if (loading && mode === "login") return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-slate-400 font-bold animate-pulse">CONNECTING DB...</p>
                </div>
            );

            if (mode === "login") return <LoginScreen teachers={teachers} classes={classes} 
                                            onMasterLogin={()=>setMode("master")} 
                                            onTeacherLogin={t=>{setCurrUser(t); setMode("teacher");}} 
                                            onStudentLogin={(s,c)=>{setCurrUser(s); setCurrClass(c); setMode("student");}} />;
            if (mode === "student") return <StudentApp student={currUser} classData={currClass} onAddRecord={addRecord} onLogout={()=>setMode("login")} />;
            if (mode === "teacher") return <TeacherApp teacher={currUser} classes={classes.filter(c=>c.teacher_id===currUser.id)} onLogout={()=>setMode("login")} />;
            if (mode === "master") return <MasterApp teachers={teachers} onUpdateTeacher={upTeacher} onLogout={()=>setMode("login")} />;
            return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IBGrowApp />);
    </script>
</body>
</html>
