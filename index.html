<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>IBGrow</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      background: #f1f5f9;
      font-family: Pretendard, sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    const { useState, useEffect } = React;

    // ═══════════════════════════════════════════════
    // SUPABASE
    // ═══════════════════════════════════════════════

    const SUPABASE_URL = "https://pqjuvuflinnrpemqcafl.supabase.co";

    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxanV2dWZsaW5ucnBlbXFjYWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NzAzMjQsImV4cCI6MjA5NDA0NjMyNH0.E4sJv1gM9TbWG-2o90aH8wJXZMLRY_uLQ9fgWARX1Ro";

    const supabase = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    // ═══════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════

    function App() {

      const [loading, setLoading] = useState(true);
      const [syncing, setSyncing] = useState(false);

      const [role, setRole] = useState(null);
      const [user, setUser] = useState(null);

      const [teachers, setTeachers] = useState([]);
      const [classes, setClasses] = useState([]);
      const [students, setStudents] = useState([]);
      const [records, setRecords] = useState([]);

      const [loginId, setLoginId] = useState('');
      const [loginPw, setLoginPw] = useState('');

      const [teacherName, setTeacherName] = useState('');
      const [teacherCode, setTeacherCode] = useState('');

      const [className, setClassName] = useState('');
      const [studentName, setStudentName] = useState('');

      // ═══════════════════════════════════════════════
      // LOAD
      // ═══════════════════════════════════════════════

      useEffect(() => {
        loadAll();

        const saved = localStorage.getItem('ibgrow-session');

        if(saved){
          const parsed = JSON.parse(saved);
          setRole(parsed.role);
          setUser(parsed.user);
        }

      }, []);

      async function loadAll(){

        try {

          setLoading(true);

          const teachersRes = await supabase
            .from('teachers')
            .select('*');

          const classesRes = await supabase
            .from('classes')
            .select('*');

          const studentsRes = await supabase
            .from('students')
            .select('*');

          const recordsRes = await supabase
            .from('records')
            .select('*');

          setTeachers(teachersRes.data || []);
          setClasses(classesRes.data || []);
          setStudents(studentsRes.data || []);
          setRecords(recordsRes.data || []);

        } catch(err){
          console.error(err);
          alert('데이터 로드 실패');
        } finally {
          setLoading(false);
        }
      }

      // ═══════════════════════════════════════════════
      // LOGIN
      // ═══════════════════════════════════════════════

      function login(){

        // MASTER
        if(loginId === 'admin' && loginPw === 'grow123'){

          const session = {
            role: 'master',
            user: {
              name: '관리자'
            }
          };

          setRole('master');
          setUser(session.user);

          localStorage.setItem(
            'ibgrow-session',
            JSON.stringify(session)
          );

          return;
        }

        // TEACHER
        const teacher = teachers.find(
          t => t.teacher_code === loginId
          && t.password === loginPw
        );

        if(teacher){

          const session = {
            role: 'teacher',
            user: teacher
          };

          setRole('teacher');
          setUser(teacher);

          localStorage.setItem(
            'ibgrow-session',
            JSON.stringify(session)
          );

          return;
        }

        // STUDENT
        const student = students.find(
          s => s.student_code === loginId
        );

        if(student){

          const session = {
            role: 'student',
            user: student
          };

          setRole('student');
          setUser(student);

          localStorage.setItem(
            'ibgrow-session',
            JSON.stringify(session)
          );

          return;
        }

        alert('로그인 실패');
      }

      function logout(){
        localStorage.removeItem('ibgrow-session');
        setRole(null);
        setUser(null);
      }

      // ═══════════════════════════════════════════════
      // CRUD
      // ═══════════════════════════════════════════════

      async function addTeacher(){

        if(!teacherName || !teacherCode){
          alert('입력 필요');
          return;
        }

        try {

          setSyncing(true);

          const payload = {
            name: teacherName,
            teacher_code: teacherCode,
            password: '1234'
          };

          const { data, error } = await supabase
            .from('teachers')
            .insert([payload])
            .select();

          if(error) throw error;

          setTeachers(prev => [...prev, ...data]);

          setTeacherName('');
          setTeacherCode('');

        } catch(err){
          console.error(err);
          alert('교사 추가 실패');
        } finally {
          setSyncing(false);
        }
      }

      async function addClass(){

        if(!className){
          alert('반 이름 입력');
          return;
        }

        try {

          setSyncing(true);

          const payload = {
            teacher_id: user.id,
            class_name: className,
            class_code: Math.random().toString(36).slice(2,8)
          };

          const { data, error } = await supabase
            .from('classes')
            .insert([payload])
            .select();

          if(error) throw error;

          setClasses(prev => [...prev, ...data]);
          setClassName('');

        } catch(err){
          console.error(err);
        } finally {
          setSyncing(false);
        }
      }

      async function addStudent(classId){

        if(!studentName){
          alert('학생 이름 입력');
          return;
        }

        try {

          setSyncing(true);

          const payload = {
            class_id: classId,
            name: studentName,
            student_code: Math.random().toString(36).slice(2,8),
            total_xp: 0,
            level: 1
          };

          const { data, error } = await supabase
            .from('students')
            .insert([payload])
            .select();

          if(error) throw error;

          setStudents(prev => [...prev, ...data]);
          setStudentName('');

        } catch(err){
          console.error(err);
        } finally {
          setSyncing(false);
        }
      }

      async function addXP(student){

        try {

          setSyncing(true);

          const xp = 10;

          await supabase
            .from('records')
            .insert([
              {
                student_id: student.id,
                xp,
                memo: '활동 참여'
              }
            ]);

          const updatedXp = (student.total_xp || 0) + xp;

          await supabase
            .from('students')
            .update({
              total_xp: updatedXp,
              level: Math.floor(updatedXp / 100) + 1
            })
            .eq('id', student.id);

          loadAll();

        } catch(err){
          console.error(err);
        } finally {
          setSyncing(false);
        }
      }

      // ═══════════════════════════════════════════════
      // AUTO BACKUP
      // ═══════════════════════════════════════════════

      useEffect(() => {

        const interval = setInterval(() => {

          const backup = {
            teachers,
            classes,
            students,
            records,
            savedAt: new Date().toISOString()
          };

          localStorage.setItem(
            'ibgrow-backup',
            JSON.stringify(backup)
          );

          console.log('자동 백업 완료');

        }, 1000 * 60 * 5);

        return () => clearInterval(interval);

      }, [teachers, classes, students, records]);

      // ═══════════════════════════════════════════════
      // REALTIME
      // ═══════════════════════════════════════════════

      useEffect(() => {

        const channel = supabase
          .channel('ibgrow-live')
          .on(
            'postgres_changes',
            {
              event: '*',
              schema: 'public'
            },
            () => {
              loadAll();
            }
          )
          .subscribe();

        return () => {
          supabase.removeChannel(channel);
        };

      }, []);

      // ═══════════════════════════════════════════════
      // LOADING
      // ═══════════════════════════════════════════════

      if(loading){
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center">
              <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>

              <p className="font-bold text-slate-700">
                데이터 불러오는 중...
              </p>
            </div>
          </div>
        );
      }

      // ═══════════════════════════════════════════════
      // LOGIN SCREEN
      // ═══════════════════════════════════════════════

      if(!role){

        return (
          <div className="min-h-screen flex items-center justify-center p-4">

            <div className="bg-white rounded-3xl shadow-xl p-6 w-full max-w-md">

              <h1 className="text-3xl font-black text-center mb-6">
                IBGrow
              </h1>

              <div className="space-y-3">

                <input
                  className="w-full border rounded-xl p-3"
                  placeholder="아이디"
                  value={loginId}
                  onChange={e => setLoginId(e.target.value)}
                />

                <input
                  type="password"
                  className="w-full border rounded-xl p-3"
                  placeholder="비밀번호"
                  value={loginPw}
                  onChange={e => setLoginPw(e.target.value)}
                />

                <button
                  onClick={login}
                  className="w-full bg-blue-600 text-white p-3 rounded-xl font-bold"
                >
                  로그인
                </button>

                <div className="text-sm text-slate-500 pt-2">
                  관리자: admin / grow123
                </div>

              </div>

            </div>

          </div>
        );
      }

      // ═══════════════════════════════════════════════
      // APP UI
      // ═══════════════════════════════════════════════

      return (
        <div className="min-h-screen p-4 md:p-8 overflow-x-hidden">

          {syncing && (
            <div className="fixed bottom-4 right-4 bg-blue-600 text-white px-4 py-2 rounded-full shadow-xl animate-pulse z-50">
              저장 중...
            </div>
          )}

          <div className="bg-white rounded-3xl p-4 md:p-6 shadow-xl mb-6">

            <div className="flex flex-col md:flex-row justify-between gap-4">

              <div>
                <h1 className="text-2xl md:text-4xl font-black">
                  IBGrow
                </h1>

                <p className="text-slate-500 mt-1">
                  {role} 로그인
                </p>
              </div>

              <button
                onClick={logout}
                className="bg-red-500 text-white px-4 py-2 rounded-xl font-bold"
              >
                로그아웃
              </button>

            </div>
          </div>

          {role === 'master' && (

            <div className="bg-white rounded-3xl p-6 shadow-xl mb-6">

              <h2 className="text-2xl font-black mb-4">
                교사 관리
              </h2>

              <div className="grid grid-cols-1 md:grid-cols-3 gap-3 mb-4">

                <input
                  className="border rounded-xl p-3"
                  placeholder="교사 이름"
                  value={teacherName}
                  onChange={e => setTeacherName(e.target.value)}
                />

                <input
                  className="border rounded-xl p-3"
                  placeholder="교사 코드"
                  value={teacherCode}
                  onChange={e => setTeacherCode(e.target.value)}
                />

                <button
                  onClick={addTeacher}
                  className="bg-blue-600 text-white rounded-xl font-bold"
                >
                  교사 추가
                </button>

              </div>

              <div className="space-y-3">

                {teachers.map(t => (
                  <div
                    key={t.id}
                    className="border rounded-2xl p-4"
                  >
                    <div className="font-bold">
                      {t.name}
                    </div>

                    <div className="text-slate-500 text-sm">
                      코드: {t.teacher_code}
                    </div>
                  </div>
                ))}

              </div>

            </div>
          )}

          {role === 'teacher' && (

            <div className="space-y-6">

              <div className="bg-white rounded-3xl p-6 shadow-xl">

                <h2 className="text-2xl font-black mb-4">
                  반 관리
                </h2>

                <div className="flex flex-col md:flex-row gap-3 mb-4">

                  <input
                    className="flex-1 border rounded-xl p-3"
                    placeholder="반 이름"
                    value={className}
                    onChange={e => setClassName(e.target.value)}
                  />

                  <button
                    onClick={addClass}
                    className="bg-blue-600 text-white px-5 rounded-xl font-bold"
                  >
                    반 추가
                  </button>

                </div>

                <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">

                  {classes
                    .filter(c => c.teacher_id === user.id)
                    .map(c => (

                    <div
                      key={c.id}
                      className="border rounded-2xl p-4"
                    >

                      <h3 className="font-black text-xl mb-3">
                        {c.class_name}
                      </h3>

                      <div className="flex flex-col md:flex-row gap-2 mb-4">

                        <input
                          className="flex-1 border rounded-xl p-3"
                          placeholder="학생 이름"
                          value={studentName}
                          onChange={e => setStudentName(e.target.value)}
                        />

                        <button
                          onClick={() => addStudent(c.id)}
                          className="bg-green-600 text-white px-4 rounded-xl font-bold"
                        >
                          학생 추가
                        </button>

                      </div>

                      <div className="space-y-3">

                        {students
                          .filter(s => s.class_id === c.id)
                          .map(s => (

                          <div
                            key={s.id}
                            className="bg-slate-100 rounded-2xl p-4"
                          >

                            <div className="flex flex-col md:flex-row justify-between gap-3">

                              <div>
                                <div className="font-black text-lg">
                                  {s.name}
                                </div>

                                <div className="text-sm text-slate-500">
                                  LV.{s.level} / XP {s.total_xp}
                                </div>

                                <div className="text-xs text-slate-400 mt-1">
                                  코드: {s.student_code}
                                </div>
                              </div>

                              <button
                                onClick={() => addXP(s)}
                                className="bg-yellow-500 text-white px-4 py-2 rounded-xl font-bold"
                              >
                                +10 XP
                              </button>

                            </div>

                          </div>
                        ))}

                      </div>

                    </div>
                  ))}

                </div>

              </div>

            </div>
          )}

          {role === 'student' && (

            <div className="bg-white rounded-3xl p-6 shadow-xl max-w-xl mx-auto">

              <h2 className="text-3xl font-black mb-4 text-center">
                {user.name}
              </h2>

              <div className="text-center">

                <div className="text-6xl font-black text-blue-600 mb-2">
                  LV.{user.level}
                </div>

                <div className="text-2xl font-bold text-slate-700">
                  XP {user.total_xp}
                </div>

              </div>

            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

  </script>
</body>
</html>
