<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IB Grow - 성장을 위한 기록</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // 브라우저 환경을 위한 전역 변수 설정 (import 대체)
        const { useState, useEffect, useRef, useCallback, useMemo } = React;
        const { createClient } = supabase;

        // ═══════════════════════════════════════════════════════════════════════════════
        // 1. CONFIG & SUPABASE SETTINGS
        // ═══════════════════════════════════════════════════════════════════════════════
        const SUPABASE_URL = "https://pqjuvuflinnrpemqcafl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBxanV2dWZsaW5ucnBlbXFjYWZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0NzAzMjQsImV4cCI6MjA5NDA0NjMyNH0.E4sJv1gM9TbWG-2o90aH8wJXZMLRY_uLQ9fgWARX1Ro";
        const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const GEMINI_API_KEY = "AIzaSyAbjeTs7-di6mrIT7JKhCxCOGvXPjjn76M";
        const MASTER_ID = "admin";
        const MASTER_PW = "grow123";

        // IB 관련 상수 (기존 IBGrow.jsx 데이터 유지)
        const IB_PROFILES = [
            { id: "inquirer",      icon: "🔍", label: "탐구하는 사람",   color: "#8B5CF6" },
            { id: "knowledgeable", icon: "📚", label: "지식이 있는 사람", color: "#3B82F6" },
            { id: "thinker",       icon: "💡", label: "생각하는 사람",   color: "#F59E0B" },
            { id: "communicator",  icon: "💬", label: "소통하는 사람",   color: "#10B981" },
            { id: "principled",    icon: "⚖️", label: "원칙이 있는 사람", color: "#EF4444" },
            { id: "open-minded",   icon: "🌍", label: "열린 마음",       color: "#06B6D4" },
            { id: "caring",        icon: "🤝", label: "배려하는 사람",   color: "#EC4899" },
            { id: "risk-taker",    icon: "🚀", label: "도전하는 사람",   color: "#F97316" },
            { id: "balanced",      icon: "⚡", label: "균형잡힌 사람",   color: "#84CC16" },
            { id: "reflective",    icon: "💭", label: "성찰하는 사람",   color: "#A78BFA" },
        ];

        const LEVELS = [
            { lv: 1, name: "씨앗",   icon: "🌱", xp: 0    },
            { lv: 2, name: "새싹",   icon: "🌿", xp: 150  },
            { lv: 3, name: "탐구자", icon: "🔭", xp: 400  },
            { lv: 4, name: "발견자", icon: "📖", xp: 800  },
            { lv: 5, name: "사상가", icon: "💡", xp: 1500 },
            { lv: 6, name: "선구자", icon: "🚀", xp: 2500 },
            { lv: 7, name: "마스터", icon: "👑", xp: 4000 },
        ];

        const getLvInfo = xp => LEVELS.reduce((acc, curr) => (xp >= curr.xp ? curr : acc), LEVELS[0]);

        // ═══════════════════════════════════════════════════════════════════════════════
        // 2. AI & OCR LOGIC (기존 IBGrow.jsx 기능)
        // ═══════════════════════════════════════════════════════════════════════════════
        async function callGemini(text) {
            const prompt = `Analyze the following student reflection and assign IB Profile scores (0-10 each). 
            Output format: JSON { "profiles": { "inquirer": 5, ... }, "summary": "brief feedback" }
            Text: ${text}`;
            
            try {
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const json = await resp.json();
                return JSON.parse(json.candidates[0].content.parts[0].text.replace(/```json|```/g, ""));
            } catch (e) {
                console.error("AI 분석 실패", e);
                return null;
            }
        }

        // ═══════════════════════════════════════════════════════════════════════════════
        // 3. UI COMPONENTS (Login, Student, Teacher, Master)
        // ═══════════════════════════════════════════════════════════════════════════════

        function LoginScreen({ teachers, classes, onStudentLogin, onTeacherLogin, onMasterLogin }) {
            const [id, setId] = useState("");
            const [pw, setPw] = useState("");
            const handleLogin = () => {
                if (id === MASTER_ID && pw === MASTER_PW) return onMasterLogin();
                const teacher = teachers.find(t => t.teacher_code === id);
                if (teacher) return onTeacherLogin(teacher);
                const student = classes.flatMap(c => c.students || []).find(s => s.student_code === id);
                if (student) return onStudentLogin(student, classes.find(c => c.id === student.class_id));
                alert("코드를 다시 확인해 주세요.");
            };
            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-6 bg-indigo-50">
                    <div className="w-full max-w-md p-10 bg-white rounded-[3rem] shadow-2xl text-center">
                        <div className="text-7xl mb-6">🌱</div>
                        <h1 className="text-4xl font-black text-indigo-600 mb-2">IB Grow</h1>
                        <p className="text-slate-400 mb-10 font-medium tracking-tight">우리는 매일 성장하고 있어요</p>
                        <div className="space-y-4">
                            <input className="w-full p-5 bg-slate-100 border-none rounded-3xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all" placeholder="개인코드" value={id} onChange={e=>setId(e.target.value)} />
                            <input className="w-full p-5 bg-slate-100 border-none rounded-3xl focus:ring-2 focus:ring-indigo-400 outline-none transition-all" type="password" placeholder="비밀번호(관리자용)" value={pw} onChange={e=>setPw(e.target.value)} />
                            <button onClick={handleLogin} className="w-full p-5 bg-indigo-600 text-white rounded-3xl font-bold shadow-xl shadow-indigo-200 active:scale-95 transition-all">입장하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        function StudentApp({ student, classData, onAddRecord, onLogout }) {
            const [content, setContent] = useState("");
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const lvInfo = getLvInfo(student.total_xp || 0);

            const handleRecord = async () => {
                if (!content.trim()) return alert("기록을 입력하세요.");
                setIsAnalyzing(true);
                
                const aiResult = await callGemini(content);
                const profiles = aiResult ? Object.keys(aiResult.profiles).filter(k => aiResult.profiles[k] > 5) : ["inquirer"];
                const xp = 20 + (profiles.length * 5);

                const newRec = {
                    student_id: student.id,
                    date: new Date().toISOString(),
                    content,
                    profiles,
                    xp,
                    type: "student_entry"
                };

                await onAddRecord(classData.id, newRec, xp, aiResult?.profiles || {});
                setContent("");
                setIsAnalyzing(false);
                alert("기록이 저장되었습니다! 성장에너지를 얻었어요.");
            };

            return (
                <div className="min-h-screen pb-24">
                    <div className="bg-white p-8 rounded-b-[3.5rem] shadow-sm mb-8 border-b">
                        <div className="flex justify-between items-center mb-8">
                            <div>
                                <h2 className="text-3xl font-black text-slate-800">{student.name}</h2>
                                <p className="text-indigo-600 font-bold">{classData.name}</p>
                            </div>
                            <button onClick={onLogout} className="p-4 bg-slate-50 rounded-3xl text-slate-400">🚪</button>
                        </div>
                        <div className="bg-indigo-600 p-7 rounded-[2.5rem] text-white shadow-lg shadow-indigo-100 flex items-center gap-6">
                            <div className="text-6xl bg-white/20 w-24 h-24 flex items-center justify-center rounded-[2rem]">{lvInfo.icon}</div>
                            <div className="flex-1">
                                <div className="flex justify-between items-end mb-3">
                                    <span className="font-black text-xl">Lv.{lvInfo.lv} {lvInfo.name}</span>
                                    <span className="text-sm font-bold opacity-80">{student.total_xp || 0} XP</span>
                                </div>
                                <div className="h-4 bg-white/20 rounded-full overflow-hidden">
                                    <div className="bg-white h-full transition-all duration-1000" style={{width: `${Math.min(100, ((student.total_xp || 0)/4000)*100)}%`}}></div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="px-6 space-y-8 max-w-2xl mx-auto">
                        <div className="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                            <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-3">📝 오늘 어떤 배움이 있었나요?</h3>
                            <textarea className="w-full h-48 p-6 bg-slate-50 rounded-[2rem] outline-none resize-none text-lg mb-6 focus:ring-2 focus:ring-indigo-400 transition-all" placeholder="배운 내용이나 느낀 점을 자유롭게 적어보세요..." value={content} onChange={e=>setContent(e.target.value)} />
                            <button onClick={handleRecord} disabled={isAnalyzing} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-bold text-xl active:scale-95 transition-all shadow-lg shadow-indigo-100 disabled:opacity-50">
                                {isAnalyzing ? "AI가 배움을 분석 중..." : "기록 남기기"}
                            </button>
                        </div>

                        <div className="space-y-4">
                            <h3 className="text-lg font-bold text-slate-800 px-2">나의 배움 발자취</h3>
                            {classData.records?.filter(r=>r.student_id === student.id).sort((a,b)=>new Date(b.date)-new Date(a.date)).map(r => (
                                <div key={r.id} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                                    <div className="flex justify-between text-xs text-slate-400 font-bold mb-3 uppercase tracking-wider">
                                        <span>{new Date(r.date).toLocaleDateString()}</span>
                                        <span className="text-indigo-500">+{r.xp} XP</span>
                                    </div>
                                    <p className="text-slate-600 text-lg leading-relaxed mb-4">{r.content}</p>
                                    <div className="flex flex-wrap gap-2">
                                        {r.profiles?.map(p => (
                                            <span key={p} className="px-3 py-1 bg-indigo-50 text-indigo-500 text-xs rounded-full font-bold">#{IB_PROFILES.find(ip=>ip.id===p)?.label}</span>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- Teacher App ---
        function TeacherApp({ teacher, classes, onLogout }) {
            const myClasses = classes.filter(c => c.teacher_id === teacher.id);
            return (
                <div className="min-h-screen bg-slate-50">
                    <header className="bg-white p-8 border-b flex justify-between items-center shadow-sm">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-indigo-100 rounded-2xl flex items-center justify-center text-2xl">👩‍🏫</div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800">{teacher.name} 선생님</h1>
                                <p className="text-xs text-indigo-500 font-black uppercase tracking-widest">Teacher Dashboard</p>
                            </div>
                        </div>
                        <button onClick={onLogout} className="p-4 text-slate-400 hover:bg-slate-50 rounded-3xl transition-all">🚪</button>
                    </header>
                    <main className="p-8 max-w-4xl mx-auto space-y-8">
                        {myClasses.map(c => (
                            <div key={c.id} className="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
                                <div className="p-8 bg-indigo-50/50 border-b border-indigo-100 flex justify-between items-center">
                                    <h3 className="text-2xl font-black text-indigo-900">{c.name}</h3>
                                    <span className="px-4 py-2 bg-white rounded-2xl text-sm font-bold text-indigo-600 border border-indigo-100">{c.students?.length || 0} 명의 학생</span>
                                </div>
                                <div className="p-8 grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {c.students?.sort((a,b)=>a.num - b.num).map(s => (
                                        <div key={s.id} className="flex items-center justify-between p-5 bg-slate-50 rounded-[1.5rem] border border-transparent hover:border-indigo-200 transition-all">
                                            <span className="font-bold text-slate-700">{s.num}. {s.name}</span>
                                            <div className="flex items-center gap-3">
                                                <span className="text-xs font-black px-2 py-1 bg-white rounded-lg text-indigo-500 border border-indigo-100">Lv.{s.level}</span>
                                                <span className="text-xs text-slate-400 font-bold">{s.total_xp} XP</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ))}
                    </main>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════════════════════════════════
        // 4. MAIN APP LOGIC
        // ═══════════════════════════════════════════════════════════════════════════════
        function IBGrowApp() {
            const [loading, setLoading] = useState(true);
            const [mode, setMode] = useState("login");
            const [teachers, setTeachers] = useState([]);
            const [classes, setClasses] = useState([]);
            const [currUser, setCurrUser] = useState(null);
            const [currClass, setCurrClass] = useState(null);

            const fetchData = async () => {
                const { data: t } = await sb.from('teachers').select('*');
                const { data: c } = await sb.from('classes').select('*, students(*), records(*)');
                setTeachers(t || []);
                setClasses(c || []);
                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const addRecord = async (cid, rec, xp, profileScores) => {
                // 1. Record 저장
                await sb.from('records').insert([{ ...rec, class_id: cid, profile_scores: profileScores }]);
                
                // 2. Student 점수 업데이트
                const newXp = (currUser.total_xp || 0) + xp;
                const newProfiles = { ...(currUser.profiles || {}) };
                Object.entries(profileScores).forEach(([k,v]) => {
                    newProfiles[k] = (newProfiles[k] || 0) + v;
                });

                const { data: updatedStudent } = await sb.from('students')
                    .update({ total_xp: newXp, profiles: newProfiles, level: getLvInfo(newXp).lv })
                    .eq('id', currUser.id)
                    .select()
                    .single();

                // 3. 로컬 상태 갱신
                setCurrUser(updatedStudent);
                fetchData(); // 전체 데이터 다시 불러오기
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white">
                    <div className="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p className="text-slate-400 font-black text-xl animate-pulse">학교 데이터를 가져오는 중...</p>
                </div>
            );

            if (mode === "login") return <LoginScreen teachers={teachers} classes={classes} 
                                            onMasterLogin={()=>setMode("master")} 
                                            onTeacherLogin={t=>{setCurrUser(t); setMode("teacher");}} 
                                            onStudentLogin={(s,c)=>{setCurrUser(s); setCurrClass(c); setMode("student");}} />;
            
            if (mode === "student") return <StudentApp student={currUser} classData={currClass} onAddRecord={addRecord} onLogout={()=>setMode("login")} />;
            if (mode === "teacher") return <TeacherApp teacher={currUser} classes={classes} onLogout={()=>setMode("login")} />;
            
            return <div className="p-20 text-center">관리자 모드는 준비 중입니다. <button onClick={()=>setMode("login")}>돌아가기</button></div>;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<IBGrowApp />);
    </script>
</body>
</html>
