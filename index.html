<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IB Grow 🌱</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <!-- React + ReactDOM (ESM) -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18",
      "react-dom/client": "https://esm.sh/react-dom@18/client",
      "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime"
    }
  }
  </script>

  <script type="module">
    import { createElement } from "react";
    import { createRoot } from "react-dom/client";

    // IBGrow.jsx를 동적으로 변환해서 로드
    const res = await fetch("./IBGrow.jsx");
    const code = await res.text();

    // JSX → JS 변환 (Babel standalone)
    const babelUrl = "https://unpkg.com/@babel/standalone/babel.min.js";
    await new Promise((resolve) => {
      const s = document.createElement("script");
      s.src = babelUrl;
      s.onload = resolve;
      document.head.appendChild(s);
    });

    const transformed = Babel.transform(code, {
      presets: [
        ["react", { runtime: "automatic" }],
        ["env", { targets: { esmodules: true }, modules: false }]
      ]
    }).code;

    const blob = new Blob([transformed], { type: "application/javascript" });
    const url = URL.createObjectURL(blob);
    const { default: App } = await import(url);

    createRoot(document.getElementById("root")).render(createElement(App));
  </script>
</body>
</html>
